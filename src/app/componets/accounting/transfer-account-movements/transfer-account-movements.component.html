<app-page-header
  [title]="'TransferAccountMovements.Title' | translate"
  [title1]="'Nav.Accounting.GL' | translate"
  [activeTitle]="'TransferAccountMovements.Title' | translate">
</app-page-header>

<div class="row justify-content-center">
  <div class="col-xl-6 col-lg-8 col-md-10">
    <div class="card custom-card">

      <div class="card-header">
        <div class="card-title">
          <i class="ti ti-transfer me-2"></i>
          {{ 'TransferAccountMovements.Title' | translate }}
        </div>
      </div>

      <div class="card-body">

        <!-- Loading -->
        <div *ngIf="loading" class="d-flex justify-content-center my-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">{{ 'General.Loading' | translate }}</span>
          </div>
        </div>

        <ng-container *ngIf="!loading">

          <div class="tam-form">

            <!-- From Account -->
            <div class="tam-row">
              <label class="tam-label">
                {{ 'TransferAccountMovements.FromAccount' | translate }}
                <span class="tam-required">*</span>
              </label>
              <div class="tam-picker-wrap">
                <ng-select
                  [items]="accounts"
                  bindValue="no"
                  [searchFn]="accountSearchFn"
                  [searchable]="true"
                  [clearable]="true"
                  [(ngModel)]="fromAccountNo"
                  [placeholder]="'TransferAccountMovements.SelectAccount' | translate"
                  appendTo="body"
                  class="tam-select">
                  <ng-template ng-label-tmp let-item="item">
                    <span class="tam-val-no">{{ item.no }}</span>
                    <span class="tam-val-name">{{ item.name }}</span>
                  </ng-template>
                  <ng-template ng-option-tmp let-item="item">
                    <span class="tam-opt-no">{{ item.no }}</span>
                    <span class="tam-opt-name">{{ item.name }}</span>
                    <span *ngIf="item.Ename" class="tam-opt-ename">{{ item.Ename }}</span>
                  </ng-template>
                </ng-select>
              </div>
            </div>

            <!-- Arrow -->
            <div class="tam-arrow">
              <i class="ti ti-arrow-down"></i>
            </div>

            <!-- To Account -->
            <div class="tam-row">
              <label class="tam-label">
                {{ 'TransferAccountMovements.ToAccount' | translate }}
                <span class="tam-required">*</span>
              </label>
              <div class="tam-picker-wrap">
                <ng-select
                  [items]="accounts"
                  bindValue="no"
                  [searchFn]="accountSearchFn"
                  [searchable]="true"
                  [clearable]="true"
                  [(ngModel)]="toAccountNo"
                  [placeholder]="'TransferAccountMovements.SelectAccount' | translate"
                  appendTo="body"
                  class="tam-select">
                  <ng-template ng-label-tmp let-item="item">
                    <span class="tam-val-no">{{ item.no }}</span>
                    <span class="tam-val-name">{{ item.name }}</span>
                  </ng-template>
                  <ng-template ng-option-tmp let-item="item">
                    <span class="tam-opt-no">{{ item.no }}</span>
                    <span class="tam-opt-name">{{ item.name }}</span>
                    <span *ngIf="item.Ename" class="tam-opt-ename">{{ item.Ename }}</span>
                  </ng-template>
                </ng-select>
              </div>
            </div>

            <!-- Delete old account checkbox -->
            <div class="tam-checkbox-row">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="deleteOldCheck"
                  [(ngModel)]="deleteOldAccount" />
                <label class="form-check-label" for="deleteOldCheck">
                  {{ 'TransferAccountMovements.DeleteOldAccount' | translate }}
                </label>
              </div>
            </div>

            <!-- Warning -->
            <div class="tam-warning">
              <i class="ti ti-alert-triangle me-2"></i>
              {{ 'TransferAccountMovements.Warning' | translate }}
            </div>

            <!-- Action -->
            <div class="tam-actions">
              <button class="btn btn-danger tam-btn"
                (click)="transfer()"
                [disabled]="transferring || !fromAccountNo || !toAccountNo">
                <span *ngIf="transferring" class="spinner-border spinner-border-sm me-1" role="status"></span>
                <i *ngIf="!transferring" class="ti ti-transfer me-1"></i>
                {{ 'TransferAccountMovements.Transfer' | translate }}
              </button>
            </div>

          </div>

        </ng-container>
      </div>
    </div>
  </div>
</div>

<app-confirmation-modal #confirmModal
  (confirm)="onConfirm()"
  (cancel)="onCancel()">
</app-confirmation-modal>
